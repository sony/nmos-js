# NMOS Connection API Bridge - Envoy bootstrap configuration
#
# Routes and clusters are dynamic, generated by the adapter from Registry
# state and reloaded from /etc/envoy/dynamic via filesystem watch.

node:
  id: nmos-connection-bridge
  cluster: nmos-connection-bridge

dynamic_resources:
  cds_config:
    path_config_source:
      path: /etc/envoy/dynamic/cds.json
      watched_directory:
        path: /etc/envoy/dynamic

static_resources:
  listeners:
    - name: main
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: nmos_bridge
                # log POST and PATCH requests
                access_log:
                  - name: envoy.access_loggers.stdout
                    filter:
                      or_filter:
                        filters:
                          - header_filter:
                              header:
                                name: ":method"
                                string_match:
                                  exact: "POST"
                          - header_filter:
                              header:
                                name: ":method"
                                string_match:
                                  exact: "PATCH"
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                rds:
                  route_config_name: nmos_bridge_routes
                  config_source:
                    path_config_source:
                      path: /etc/envoy/dynamic/rds.json
                      watched_directory:
                        path: /etc/envoy/dynamic
                http_filters:
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  # request size limit
                  - name: envoy.filters.http.buffer
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.buffer.v3.Buffer
                      max_request_bytes: 1048576
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901
